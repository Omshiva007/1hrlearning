title = "1hrLearning Gitleaks Configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Allowlist historical CI commit that used test-only JWT secrets"
commits = ["97c0e8e49f499a207d32c7ec0ec93319975eb130"]

[[allowlists]]
description = "Allowlist CI workflow test-only credentials"
regexTarget = "line"
paths = [
  '''.github/workflows/.*\.yml''',
]
regexes = [
  '''JWT_SECRET:\s+test[-_]''',
  '''JWT_REFRESH_SECRET:\s+test[-_]''',
]
